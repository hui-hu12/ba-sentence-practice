<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>把字句练习</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6fbf7;
      --ink: #22352e;
      --muted: #63766e;
      --leaf: #3f8a5f;
      --leaf-soft: #dff2e7;
      --sky: #dff3fb;
      --sky-deep: #197da5;
      --peach: #ffb28a;
      --rose: #ff7d95;
      --butter: #fff1b8;
      --paper: rgba(255, 255, 255, 0.94);
      --line: rgba(48, 106, 74, 0.17);
      --shadow: 0 18px 48px rgba(45, 91, 68, 0.14);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      background:
        radial-gradient(circle at 8% 10%, rgba(255, 241, 184, 0.62), transparent 23rem),
        radial-gradient(circle at 92% 12%, rgba(223, 243, 251, 0.95), transparent 24rem),
        linear-gradient(180deg, #f4fbf6 0%, #fff8ec 100%);
      overflow-x: hidden;
    }

    button,
    input {
      font: inherit;
    }

    button {
      min-height: 58px;
      border: 0;
      border-radius: var(--radius);
      padding: 0 18px;
      background: #fff;
      color: var(--ink);
      box-shadow: inset 0 0 0 2px var(--line);
      cursor: pointer;
      font-weight: 900;
      touch-action: manipulation;
      transition: transform 140ms ease, background 140ms ease, box-shadow 140ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: inset 0 0 0 2px rgba(63, 138, 95, 0.34), 0 12px 22px rgba(63, 138, 95, 0.12);
    }

    button:active {
      transform: translateY(0);
    }

    button.primary,
    button.active {
      background: var(--leaf);
      color: #fff;
      box-shadow: none;
    }

    button.warm {
      background: var(--peach);
      color: #432515;
      box-shadow: none;
    }

    button.sky {
      background: var(--sky);
      color: var(--sky-deep);
    }

    .ko {
      display: inline-block;
      margin-left: 8px;
      font-size: 0.68em;
      line-height: 1.05;
      opacity: 0.72;
      font-weight: 900;
    }

    .app {
      width: min(1320px, calc(100% - 28px));
      margin: 0 auto;
      padding: 14px 0 26px;
    }

    .top-actions,
    .mode-tabs,
    .level-tabs,
    .tool-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .level-tabs {
      margin-bottom: 12px;
    }

    .top-actions button,
    .mode-tabs button,
    .level-tabs button {
      font-size: clamp(22px, 2.2vw, 30px);
      white-space: nowrap;
    }

    .main-grid {
      display: block;
    }

    .stage {
      background: var(--paper);
      border: 2px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      min-height: 650px;
      padding: 22px;
      display: grid;
      gap: 18px;
    }

    .game-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .game-title {
      margin: 0;
      font-size: clamp(38px, 4.8vw, 64px);
      line-height: 1.05;
    }

    .prompt-box {
      min-height: 190px;
      padding: 22px;
      display: grid;
      place-items: center;
      text-align: center;
      border-radius: var(--radius);
      border: 3px dashed rgba(63, 138, 95, 0.3);
      background: #fff;
    }

    .prompt-main {
      margin: 0;
      font-size: clamp(44px, 7vw, 92px);
      line-height: 1.15;
      font-weight: 1000;
      letter-spacing: 0;
    }

    .prompt-sub {
      margin: 12px 0 0;
      font-size: clamp(24px, 3vw, 38px);
      line-height: 1.24;
      color: var(--sky-deep);
      font-weight: 900;
    }

    .answer-area {
      min-height: 118px;
      padding: 18px 20px;
      border-radius: var(--radius);
      background: rgba(223, 243, 251, 0.62);
      border: 2px solid rgba(25, 125, 165, 0.18);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .answer-text {
      font-size: clamp(36px, 5vw, 66px);
      line-height: 1.14;
      font-weight: 1000;
      text-align: center;
    }

    .fixed-word {
      min-height: 72px;
      padding: 10px 16px;
      display: inline-grid;
      place-items: center;
      border-radius: var(--radius);
      background: #e4f4ea;
      color: var(--leaf);
      font-size: clamp(30px, 3.7vw, 50px);
      line-height: 1.1;
      font-weight: 1000;
      box-shadow: inset 0 0 0 2px rgba(63, 138, 95, 0.18);
    }

    .option-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .option-grid button {
      position: relative;
      min-height: 86px;
      padding: 12px 16px 12px 78px;
      font-size: clamp(26px, 3vw, 40px);
      line-height: 1.16;
      white-space: normal;
    }

    .choice-label {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      display: grid;
      place-items: center;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--butter);
      color: #745414;
      font-size: 24px;
      font-weight: 1000;
    }

    .word-bank {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .word-bank button,
    .picked-word {
      min-height: 72px;
      padding: 10px 16px;
      font-size: clamp(30px, 3.7vw, 50px);
      line-height: 1.1;
      border-radius: var(--radius);
      background: #fff8df;
      box-shadow: inset 0 0 0 2px rgba(116, 84, 20, 0.16);
    }

    .word-bank button.used {
      opacity: 0.35;
      pointer-events: none;
    }

    .picked-word {
      border: 0;
      cursor: pointer;
      font-weight: 1000;
    }

    .typing-input {
      width: 100%;
      min-height: 92px;
      border-radius: var(--radius);
      border: 3px solid rgba(63, 138, 95, 0.24);
      padding: 12px 16px;
      font-size: clamp(34px, 4.5vw, 58px);
      line-height: 1.18;
      font-weight: 900;
      color: var(--ink);
      background: #fff;
    }

    .tool-row {
      justify-content: center;
    }

    .tool-row button {
      min-width: 112px;
    }

    .status {
      min-height: 44px;
      text-align: center;
      color: var(--leaf);
      font-size: clamp(24px, 2.6vw, 36px);
      font-weight: 1000;
    }

    .progress-line {
      height: 16px;
      border-radius: 999px;
      background: rgba(63, 138, 95, 0.14);
      overflow: hidden;
    }

    .progress-line span {
      display: block;
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--leaf), var(--sky-deep));
      transition: width 180ms ease;
    }

    .celebration {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      padding: 20px;
      background: rgba(35, 53, 46, 0.18);
      backdrop-filter: blur(3px);
    }

    .celebration.show {
      display: grid;
    }

    .celebration-box {
      width: min(720px, 100%);
      padding: 38px 30px;
      border-radius: var(--radius);
      background: #fff;
      border: 3px solid rgba(63, 138, 95, 0.24);
      box-shadow: 0 28px 72px rgba(35, 53, 46, 0.26);
      text-align: center;
      animation: popIn 240ms ease forwards;
    }

    .celebration-emoji {
      font-size: clamp(64px, 8vw, 100px);
      line-height: 1;
    }

    .celebration-title {
      margin-top: 12px;
      font-size: clamp(42px, 6vw, 78px);
      line-height: 1.08;
      font-weight: 1000;
    }

    .celebration-text {
      margin-top: 10px;
      font-size: clamp(24px, 3vw, 38px);
      color: var(--muted);
      font-weight: 900;
    }

    .hidden {
      display: none !important;
    }

    @keyframes popIn {
      from { transform: translateY(12px) scale(0.96); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }

    @media (max-width: 980px) {
      .main-grid {
        grid-template-columns: 1fr;
      }

      .option-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <nav class="level-tabs" aria-label="难易度">
      <button class="active" data-level="beginner">初级<span class="ko">초급</span></button>
      <button data-level="intermediate">中级<span class="ko">중급</span></button>
      <button data-level="advanced">高级<span class="ko">고급</span></button>
      <button id="shuffleBtn">随机题目<span class="ko">랜덤 문제</span></button>
    </nav>

    <div class="main-grid">
      <main class="stage">
        <section>
          <div class="game-head">
            <h2 class="game-title" id="gameTitle">初级 · 选择正确句子</h2>
            <div class="mode-tabs">
              <button class="active" data-mode="choice">选择<span class="ko">선택</span></button>
              <button data-mode="order">排序<span class="ko">순서</span></button>
              <button data-mode="rewrite">翻译<span class="ko">번역</span></button>
            </div>
          </div>
        </section>

        <section class="prompt-box">
          <div>
            <p class="prompt-main" id="promptMain"></p>
            <p class="prompt-sub" id="promptSub"></p>
          </div>
        </section>

        <section class="answer-area" id="answerArea"></section>
        <section class="option-grid" id="choiceOptions"></section>
        <section class="word-bank hidden" id="wordBank"></section>

        <input class="typing-input hidden" id="typingInput" placeholder="请在这里写把字句">

        <div class="tool-row">
          <button class="primary" id="checkBtn">检查<span class="ko">확인</span></button>
          <button id="answerBtn">看答案<span class="ko">정답 보기</span></button>
          <button class="warm" id="nextBtn">下一题<span class="ko">다음 문제</span></button>
          <button id="clearBtn">清空<span class="ko">지우기</span></button>
        </div>

        <div class="status" id="statusText"></div>
      </main>
    </div>
  </div>

  <div class="celebration" id="celebration" role="status" aria-live="polite">
    <div class="celebration-box">
      <div class="celebration-emoji">🎉</div>
      <div class="celebration-title">答对了！<span class="ko">정답이에요!</span></div>
      <div class="celebration-text">这个把字句说得很清楚。<span class="ko">아주 자연스러워요.</span></div>
    </div>
  </div>

  <script>

          { prompt: "帽子 / 戴 / 起来", ko: "모자를 써요", answer: "请把帽子戴起来。", words: ["请", "把", "帽子", "戴", "起来"], base: "请戴起来帽子。", options: ["请把帽子戴起来。", "请帽子把戴起来。", "请把戴帽子起来。", "请把帽子起来戴。"] },
          { prompt: "围巾 / 围 / 起来", ko: "목도리를 둘러요", answer: "请把围巾围起来。", words: ["请", "把", "围巾", "围", "起来"], base: "请围起来围巾。", options: ["请把围巾围起来。", "请围巾把围起来。", "请把围起来围巾。", "请把围巾起来围。"] },

        title: "翻译成把字句",
        questions: [
          { prompt: "请改写：再读一遍今天学的句子。", ko: "오늘 배운 문장을 다시 한 번 읽어요", answer: "请把今天学的句子再读一遍。", words: ["请", "把", "今天学的句子", "再", "读", "一遍"], base: "请再读一遍今天学的句子。", options: ["请把今天学的句子再读一遍。", "请今天学的句子把再读一遍。", "请把再读今天学的句子一遍。", "请把一遍再读今天学的句子。"] },
          { prompt: "请改写：写下来刚才听到的内容。", ko: "방금 들은 내용을 적어요", answer: "请把刚才听到的内容写下来。", words: ["请", "把", "刚才听到的内容", "写", "下来"], base: "请写下来刚才听到的内容。", options: ["请把刚才听到的内容写下来。", "请刚才听到的内容把写下来。", "请把写刚才听到的内容下来。", "请把下来写刚才听到的内容。"] },
          { prompt: "请改写：发到群里这张照片。", ko: "이 사진을 단체방에 보내요", answer: "请把这张照片发到群里。", words: ["请", "把", "这张照片", "发到", "群里"], base: "请发这张照片到群里。", options: ["请把这张照片发到群里。", "请这张照片把发到群里。", "请把发到这张照片群里。", "请把群里发到这张照片。"] },
          { prompt: "请改写：告诉我明天的时间。", ko: "내일 시간을 알려 주세요", answer: "请把明天的时间告诉我。", words: ["请", "把", "明天的时间", "告诉", "我"], base: "请告诉我明天的时间。", options: ["请把明天的时间告诉我。", "请明天的时间把告诉我。", "请把告诉明天的时间我。", "请把我告诉明天的时间。"] },
          { prompt: "请改写：想清楚这个问题以后再回答。", ko: "이 문제를 잘 생각한 뒤 대답해요", answer: "请把这个问题想清楚以后再回答。", words: ["请", "把", "这个问题", "想", "清楚", "以后", "再", "回答"], base: "请想清楚这个问题以后再回答。", options: ["请把这个问题想清楚以后再回答。", "请这个问题把想清楚以后再回答。", "请把想清楚这个问题以后再回答。", "请把以后这个问题想清楚再回答。"] },
          { prompt: "请改写：整理好桌子上的东西。", ko: "책상 위 물건을 정리해요", answer: "请把桌子上的东西整理好。", words: ["请", "把", "桌子上的东西", "整理", "好"], base: "请整理好桌子上的东西。", options: ["请把桌子上的东西整理好。", "请桌子上的东西把整理好。", "请把整理桌子上的东西好。", "请把桌子上的东西好整理。"] },
          { prompt: "请改写：调高一点空调温度。", ko: "에어컨 온도를 조금 높여요", answer: "请把空调温度调高一点。", words: ["请", "把", "空调温度", "调", "高", "一点"], base: "请调高一点空调温度。", options: ["请把空调温度调高一点。", "请空调温度把调高一点。", "请把调空调温度高一点。", "请把一点空调温度调高。"] },
          { prompt: "请改写：调小一点声音。", ko: "소리를 조금 줄여요", answer: "请把声音调小一点。", words: ["请", "把", "声音", "调", "小", "一点"], base: "请调小一点声音。", options: ["请把声音调小一点。", "请声音把调小一点。", "请把调声音小一点。", "请把一点声音调小。"] },
          { prompt: "请改写：告诉家人这件事。", ko: "이 일을 가족에게 말해요", answer: "请把这件事告诉家人。", words: ["请", "把", "这件事", "告诉", "家人"], base: "请告诉家人这件事。", options: ["请把这件事告诉家人。", "请这件事把告诉家人。", "请把告诉这件事家人。", "请把家人告诉这件事。"] },
          { prompt: "请改写：圈出来重要的词语。", ko: "중요한 단어에 동그라미를 쳐요", answer: "请把重要的词语圈出来。", words: ["请", "把", "重要的词语", "圈", "出来"], base: "请圈出来重要的词语。", options: ["请把重要的词语圈出来。", "请重要的词语把圈出来。", "请把圈重要的词语出来。", "请把出来圈重要的词语。"] },
          { prompt: "请改写：标出来不懂的地方。", ko: "모르는 부분을 표시해요", answer: "请把不懂的地方标出来。", words: ["请", "把", "不懂的地方", "标", "出来"], base: "请标出来不懂的地方。", options: ["请把不懂的地方标出来。", "请不懂的地方把标出来。", "请把标不懂的地方出来。", "请把出来标不懂的地方。"] },
          { prompt: "请改写：放进包里钱包。", ko: "지갑을 가방에 넣어요", answer: "请把钱包放进包里。", words: ["请", "把", "钱包", "放进", "包里"], base: "请放钱包进包里。", options: ["请把钱包放进包里。", "请钱包把放进包里。", "请把放进钱包包里。", "请把包里放进钱包。"] }
        ]
      }
    };

    let currentLevel = "beginner";
    let currentMode = "choice";
    let currentIndex = 0;
    let pickedWords = [];

    const promptMain = document.getElementById("promptMain");
    const promptSub = document.getElementById("promptSub");
    const answerArea = document.getElementById("answerArea");
    const choiceOptions = document.getElementById("choiceOptions");
    const wordBank = document.getElementById("wordBank");
    const typingInput = document.getElementById("typingInput");
    const statusText = document.getElementById("statusText");
    const gameTitle = document.getElementById("gameTitle");
    const celebration = document.getElementById("celebration");

    function shuffle(items) {
      return [...items].sort(() => Math.random() - 0.5);
    }

    function normalize(text) {
      return text.replace(/[。！？!?，,\s]/g, "");
    }

    function currentQuestion() {
      return levels[currentLevel].questions[currentIndex];
    }

    function orderWords(question) {
      const baIndex = question.words.indexOf("把");
      return baIndex >= 0 ? question.words.slice(baIndex + 1) : question.words;
    }

    function orderAnswer(question) {
      const words = orderWords(question);
      return words.join("");
    }

    function orderPrefix(question) {
      const baIndex = question.words.indexOf("把");
      return baIndex >= 0 ? question.words.slice(0, baIndex + 1) : [];
    }

    function renderChoice(question) {
      answerArea.classList.add("hidden");
      wordBank.classList.add("hidden");
      typingInput.classList.add("hidden");
      choiceOptions.classList.remove("hidden");
      choiceOptions.innerHTML = "";
      shuffle(question.options).forEach((option, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.innerHTML = `<span class="choice-label">${String.fromCharCode(65 + index)}</span>${option}`;
        button.addEventListener("click", () => checkAnswer(option));
        choiceOptions.appendChild(button);
      });
    }

    function renderOrder(question) {
      pickedWords = [];
      choiceOptions.classList.add("hidden");
      typingInput.classList.add("hidden");
      answerArea.classList.remove("hidden");
      wordBank.classList.remove("hidden");
      renderPicked();
      renderWordBank(question);
    }

    function renderPicked() {
      answerArea.innerHTML = "";
      orderPrefix(currentQuestion()).forEach((word) => {
        const fixed = document.createElement("span");
        fixed.className = "fixed-word";
        fixed.textContent = word;
        answerArea.appendChild(fixed);
      });
      if (!pickedWords.length) {
        const hint = document.createElement("span");
        hint.className = "answer-text";
        hint.textContent = "请点下面的词语组成句子";
        answerArea.appendChild(hint);
        return;
      }
      pickedWords.forEach((word, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "picked-word";
        button.textContent = word;
        button.addEventListener("click", () => {
          pickedWords.splice(index, 1);
          renderPicked();
          renderWordBank(currentQuestion());
        });
        answerArea.appendChild(button);
      });
    }

    function renderWordBank(question) {
      wordBank.innerHTML = "";
      shuffle(orderWords(question)).forEach((word) => {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = word;
        button.classList.toggle("used", pickedWords.includes(word));
        button.addEventListener("click", () => {
          if (pickedWords.includes(word)) return;
          pickedWords.push(word);
          renderPicked();
          renderWordBank(question);
        });
        wordBank.appendChild(button);
      });
    }

    function renderRewrite() {
      choiceOptions.classList.add("hidden");
      wordBank.classList.add("hidden");
      answerArea.classList.add("hidden");
      typingInput.classList.remove("hidden");
      typingInput.value = "";
    }

    function render() {
      const level = levels[currentLevel];
      const question = currentQuestion();
      gameTitle.textContent = `${level.label} · ${level.title}`;
      promptMain.textContent = currentMode === "rewrite" ? question.ko : question.prompt;
      promptSub.innerHTML = currentMode === "rewrite"
        ? '请翻译成中文把字句<span class="ko">중국어 “把” 문장으로 번역하세요</span>'
        : `${question.ko}<span class="ko">정답은 “把” 문장으로 말해요</span>`;
      statusText.textContent = "";

      document.querySelectorAll("[data-level]").forEach((button) => {
        button.classList.toggle("active", button.dataset.level === currentLevel);
      });
      document.querySelectorAll("[data-mode]").forEach((button) => {
        button.classList.toggle("active", button.dataset.mode === currentMode);
      });

      if (currentMode === "choice") renderChoice(question);
      if (currentMode === "order") renderOrder(question);
      if (currentMode === "rewrite") renderRewrite(question);
    }

    function checkAnswer(value = null) {
      const question = currentQuestion();
      let submitted = value;
      if (currentMode === "order") submitted = pickedWords.join("");
      if (currentMode === "rewrite") submitted = typingInput.value;

      if (!submitted || !normalize(submitted)) {
        statusText.textContent = "请先回答。 먼저 답해 주세요.";
        return;
      }

      const target = currentMode === "order" ? orderAnswer(question) : question.answer;
      const ok = normalize(submitted) === normalize(target);
      if (ok) {
        statusText.textContent = "答对了！정답이에요!";
        celebration.classList.add("show");
        window.setTimeout(() => celebration.classList.remove("show"), 1500);
      } else {
        statusText.textContent = currentMode === "order"
          ? "再想一想：后面的顺序还不对。 뒤쪽 순서를 다시 확인하세요."
          : "再想一想：把 + 东西 + 动作 + 结果。 다시 생각해 보세요.";
      }
    }

    function revealAnswer() {
      const question = currentQuestion();
      answerArea.classList.remove("hidden");
      answerArea.innerHTML = `<div class="answer-text">${question.answer}</div>`;
      statusText.textContent = "请跟老师一起读。 선생님과 같이 읽어 보세요.";
    }

    function nextQuestion() {
      const questions = levels[currentLevel].questions;
      currentIndex = (currentIndex + 1) % questions.length;
      render();
    }

    function clearAnswer() {
      pickedWords = [];
      typingInput.value = "";
      statusText.textContent = "";
      if (currentMode === "order") {
        renderPicked();
        renderWordBank(currentQuestion());
      }
    }

    document.querySelectorAll("[data-level]").forEach((button) => {
      button.addEventListener("click", () => {
        currentLevel = button.dataset.level;
        currentIndex = 0;
        render();
      });
    });

    document.querySelectorAll("[data-mode]").forEach((button) => {
      button.addEventListener("click", () => {
        currentMode = button.dataset.mode;
        render();
      });
    });

    document.getElementById("checkBtn").addEventListener("click", () => checkAnswer());
    document.getElementById("answerBtn").addEventListener("click", revealAnswer);
    document.getElementById("nextBtn").addEventListener("click", nextQuestion);
    document.getElementById("clearBtn").addEventListener("click", clearAnswer);
    document.getElementById("shuffleBtn").addEventListener("click", () => {
      currentIndex = Math.floor(Math.random() * levels[currentLevel].questions.length);
      render();
    });
    celebration.addEventListener("click", () => celebration.classList.remove("show"));

    render();
  </script>
</body>
</html>
